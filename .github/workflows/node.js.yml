# Install dependencies and run production build on supported Node versions.
#
# If TINA_TOKEN and NEXT_PUBLIC_TINA_CLIENT_ID are both set (secret and/or variable for the
# public client id), runs `npm run build` (Tina Cloud). Otherwise runs `npm run build:local`
# so CI passes without secrets (forks, template defaults). Production (e.g. Vercel) should use Cloud.

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci

    - name: Build
      env:
        NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID || vars.NEXT_PUBLIC_TINA_CLIENT_ID }}
        TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        NEXT_PUBLIC_TINA_BRANCH: ${{ vars.NEXT_PUBLIC_TINA_BRANCH }}
      run: |
        if [ -n "$TINA_TOKEN" ] && [ -n "$NEXT_PUBLIC_TINA_CLIENT_ID" ]; then
          echo "Using Tina Cloud build (credentials present)."
          npm run build --if-present
        else
          echo "No full Tina Cloud credentials; using local Tina build (see package.json build:local)."
          npm run build:local --if-present
        fi
