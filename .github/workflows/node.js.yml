# Install dependencies and run production build on supported Node versions.
#
# Full Tina Cloud build needs repository secrets TINA_TOKEN and NEXT_PUBLIC_TINA_CLIENT_ID
# (or variable NEXT_PUBLIC_TINA_CLIENT_ID — public id, fine as a non-secret variable).
# If those are missing, CI runs `npm run build:local` (local Tina, no Cloud) so forks/PRs can still verify the app builds.

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci

    # Tina Cloud: needs token + client id (secret and/or variable for client id).
    - name: Build (Tina Cloud)
      if: ${{ secrets.TINA_TOKEN != '' && (secrets.NEXT_PUBLIC_TINA_CLIENT_ID != '' || vars.NEXT_PUBLIC_TINA_CLIENT_ID != '') }}
      run: npm run build --if-present
      env:
        NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID || vars.NEXT_PUBLIC_TINA_CLIENT_ID }}
        TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        NEXT_PUBLIC_TINA_BRANCH: ${{ vars.NEXT_PUBLIC_TINA_BRANCH }}

    # No Cloud credentials: local GraphQL build (good for CI without secrets; production deploys should use Cloud).
    - name: Build (Tina local, no Cloud)
      if: ${{ !(secrets.TINA_TOKEN != '' && (secrets.NEXT_PUBLIC_TINA_CLIENT_ID != '' || vars.NEXT_PUBLIC_TINA_CLIENT_ID != '')) }}
      run: npm run build:local --if-present
